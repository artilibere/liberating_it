name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "public/**"
      - "scripts/**"
      - "sitemap-enriched.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Audit content SEO
        run: python ../scripts/audit_content_seo.py --strict

      - name: Test
        run: python -m unittest scripts/test_build.py -v

      - name: Build
        run: python scripts/build.py --content ../content/v2 --out dist

      - name: Validate sitemap-enriched.json
        run: python ../scripts/validate_sitemap_enriched.py --sitemap dist/sitemap.xml

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: liberating-it
          directory: public/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
