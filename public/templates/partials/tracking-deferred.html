{% if tracking.enabled and tracking.gtm_id %}
<script>
window.dataLayer=window.dataLayer||[];
function gtag(){dataLayer.push(arguments);}
{% if tracking.consent_default_denied %}
gtag('consent','default',{
  'ad_storage':'denied',
  'ad_user_data':'denied',
  'ad_personalization':'denied',
  'analytics_storage':'denied',
  'functionality_storage':'denied',
  'personalization_storage':'denied',
  'security_storage':'granted',
  'wait_for_update':500
});
try{
  var _lscc=localStorage.getItem('ls_cookie_consent');
  if(_lscc==='granted'){
    gtag('consent','update',{
      'ad_storage':'granted',
      'ad_user_data':'granted',
      'ad_personalization':'granted',
      'analytics_storage':'granted',
      'functionality_storage':'granted',
      'personalization_storage':'granted'
    });
  }
}catch(e){}
{% endif %}
window.lsLoadGTM=function(){
  if(window._lsGtmLoaded)return;
  window._lsGtmLoaded=true;
  (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','{{ tracking.gtm_id }}');
};
(function(){
  var granted=false;
  try{granted=localStorage.getItem('ls_cookie_consent')==='granted';}catch(e){}
  if(granted){window.lsLoadGTM();}
})();
</script>
{% endif %}
