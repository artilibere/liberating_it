{% extends "base.html" %}

{% block content %}
{% include 'partials/breadcrumb.html' %}

<article class="ls-article ls-article--legal">
  <h1>{{ legal.h1 }}</h1>
  {% if legal.lead %}
  <p class="ls-lead">{{ legal.lead }}</p>
  {% endif %}

  {% for section in legal.sections %}
  <section aria-labelledby="legal-{{ loop.index }}">
    <h2 id="legal-{{ loop.index }}">{{ section.title }}</h2>
    <div class="ls-legal-body">{{ section.html | safe }}</div>
  </section>
  {% endfor %}
</article>
{% endblock %}
